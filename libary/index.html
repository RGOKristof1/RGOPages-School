<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>RGOSchool</title>
  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    font-family: "Roboto", sans-serif;
    font-optical-sizing: auto;
    font-weight: 200;
    font-style: normal;
    font-variation-settings:
    "wdth" 100;
    }
    html{
      font-size: clamp(12px, 2vw, 20px);
      height: 100%;
      text-align: center;
    }
    body{
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      flex-direction: column;

      height: 100%;
      
      background-color: black;
      color: rgb(110, 184, 0);

    }
    main{
      display: flex;
      flex-direction: column;
    }
    h1{
      font-size: 4rem;
      font-weight: 250;
      padding-top: 1rem;
      border-top: rgb(240, 255, 190) solid 1px;
    }
    h2{
      font-size: 3rem;
      max-width: 90vw;
      margin-bottom: 1rem;
    }
    a{
      padding-left: 1rem;
      margin-top: 1rem;
      text-align: start;
      text-decoration: none;
      color: inherit;
      font-size: 4rem;
      border-left: rgb(200, 255, 150) solid 1px;
    }
    a:hover{
      color: rgb(200, 255, 150);
    }
  </style>
</head>
<body>
  <header>
    <h2>Welcome to</h2>
    <h1>SchoolDot Libary</h1>
  </header>
  <main>
    <a href="/calculator/">Calculator</a>
    <a href="/catcher/">Catcher</a>
    <a href="/stargame/">Stargame</a>
    <a href="/feladatok/">Feladatok</a>
    <a href="/forgocukik/">Forgocukik</a>
    <a href="/hatarido/">hatarido</a>
    <a href="/reaction-time/">Reaction Time</a>
    <a href="/wiza-game/">Wiza-Game</a>
  </main>
</body>
</html>
