<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rossz UI</title>
</head>
<style>
  *{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  html{
    height: 100vh;
  }
  body{
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    flex-direction: column;
    height: 100%;
  }
  #window{
    display: grid;
    justify-content: center;
    background-color: rgba(0, 0, 0, 0.488);
    width: 30vw;
    padding: 1vw;
  }
  .inputs{
    margin: 1vw;
  }
</style>
<body>
  <h1>Udv a tovablepeshez kerlek registralj!</h1>
  <div id="window">
    <div class="inputs">
      <h2>Nev:</h2>
      <input type="text" id="name" onblur="nameComment()">
      <p id="nameComm"></p>
    </div>
    <div class="inputs">
      <h2>anyja neve:</h2>
      <select id="mothers" disabled onblur="mothersComment()">
        <option></option>
        <option>Tehen</option>
        <option>Masik Apu</option>
        <option>Izabella</option>
      </select>
    </div>
    <div class="inputs">
      <h2>email:</h2>
      <input type="text" id="email" disabled onblur="emailComment()">
      <p id="emailComm"></p>
    </div>
    <div class="inputs">
      <h2>telefonszam:</h2>
      <input type="date" id="tel" disabled onblur="telComment()">
      <p id="telComm"></p>
    </div>
    <div class="inputs">
      <h2>jelszo:</h2>
      <input type="text" id="pass1" disabled onblur="pass1Comment()">
      <p id="pass1Comm">Minimum 4 karakter</p>
    </div>
    <div class="inputs" id="pass2show" style="display: none;">
      <h2>jelszo ujra:</h2>
      <input type="text" id="pass2" onblur="showpass3()">
      <p id="emailComm"></p>
    </div>
    <div class="inputs" id="pass3show" style="display: none;">
      <h2>jelszo megint:</h2>
      <input type="text" id="pass3" onblur="showpass4()">
      <p id="emailComm"></p>
    </div>
    <div class="inputs" id="pass4show" style="display: none;">
      <h2>utoljara megegyszer jelszo:</h2>
      <input type="text" id="pass4">
      <p id="emailComm"></p>
    </div>
    <div class="inputs">
      <button onclick="tovabb()">Tovabb</button>
    </div>
  </div>
<script>
  let emailAttempt = 0
  let telAttempt = 0
  let pass1Attempt = 0
  let teljesitve = false

  function tovabb() {
    if (teljesitve == true) {
      document.getElementById("window").innerHTML = ""
    }
  }

  function showPass2() {
    document.getElementById("pass2show").style.display = "block"
    document.getElementById("pass1").disabled = true
  }
  function showpass3() {
    if (document.getElementById("pass2").value == "EROSJELSZO") {
      document.getElementById("pass3show").style.display = "block"
      document.getElementById("pass2").disabled = true
    }
  }
  function showpass4() {
    if (document.getElementById("pass3").value == "EROSJELSZO") {
      document.getElementById("pass4show").style.display = "block"
      document.getElementById("pass3").disabled = true
      teljesitve = true
    }
  }

  function nameComment() {
    if (document.getElementById("name").value != "") {
      document.getElementById("nameComm").innerText = `Fu tenyleg igy hivnak?😒`
      document.getElementById("mothers").disabled = false
      document.getElementById("name").disabled = true
    }
  }
  function mothersComment() {
    document.getElementById("email").disabled = false
      document.getElementById("mothers").disabled = true
  }
  function emailComment() {
    if (document.getElementById("email").value != "") {
      document.getElementById("emailComm").innerText = `Requres "@gmail.com"`
    }
    if (document.getElementById("email").value != "" && emailAttempt == 1) {
      document.getElementById("emailComm").innerText = `Sending Spam!`
      document.getElementById("tel").disabled = false
      document.getElementById("email").disabled = true
    }
    emailAttempt++
  }
  function telComment() {
    if (document.getElementById("tel").value != "") {
      document.getElementById("telComm").innerText = `Minta: +369830076`
    }
    if (document.getElementById("tel").value != "" && telAttempt == 1) {
      document.getElementById("telComm").innerText = `not good`
    }
    if (document.getElementById("tel").value != "" && telAttempt == 2) {
      document.getElementById("telComm").innerText = `Fine no telefon than`
      document.getElementById("pass1").disabled = false
      document.getElementById("tel").disabled = true
    }
    telAttempt++
  }
  function pass1Comment() {
    if (document.getElementById("pass1").value != "") {
      document.getElementById("pass1Comm").innerText = `maximum 7 karakter`
    }
    if (document.getElementById("pass1").value != "" && pass1Attempt == 1) {
      document.getElementById("pass1Comm").innerText = `legyen benne $ szimbolum`
    }
    if (document.getElementById("pass1").value != "" && pass1Attempt == 2) {
      document.getElementById("pass1Comm").innerText = `Legyen benne kis betu`
    }
    if (document.getElementById("pass1").value != "" && pass1Attempt == 3) {
      document.getElementById("pass1Comm").innerText = `Legyen benne szam`
    }
    if (document.getElementById("pass1").value != "" && pass1Attempt == 4) {
      document.getElementById("pass1Comm").innerText = `Tudod mit beirom neked`
      document.getElementById("pass1").value = `EROSJELSZO`
      showPass2()
    }
    pass1Attempt++
  }
</script>
</body>
</html>
