<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #home-button{
          text-decoration: none;
          color: inherit;
          font-size: 1rem;
          position: absolute;
          bottom: 0;
          right: 0;
          margin: 1rem;
          padding: .5rem;
          border-radius: .5rem;
          background-color: #ffffff10;
        }
        #home-button:hover{
          color: rgb(200, 255, 150);
        }
      </style>
</head>
<body>
  <a href="/" id="home-button">Home</a>
    <div id="calc-wrapper">
        <div id="calc-output"></div>
        <div id="calc-buttons-wrapper">
            <div id="left-buttons-wrapper">
                <button onclick="clicked('+')">+</button>
                <button onclick="clicked('-')">-</button>
                <button onclick="clicked('*')">*</button>
                <button onclick="clicked('/')">/</button>
                <button onclick="clicked('c')">c</button>
            </div>
            <div id="right-buttons-wrapper">
                <button onclick="clicked('7')">7</button>
                <button onclick="clicked('8')">8</button>
                <button onclick="clicked('9')">9</button>
                <button onclick="clicked('4')">4</button>
                <button onclick="clicked('5')">5</button>
                <button onclick="clicked('6')">6</button>
                <button onclick="clicked('1')">1</button>
                <button onclick="clicked('2')">2</button>
                <button onclick="clicked('3')">3</button>
                <button onclick="clicked('0')">0</button>
                <button onclick="clicked('.')">.</button>
                <button onclick="clicked('=')">=</button>
            </div>
            <div id="delete-wrapper">
              <button onclick="clicked('del')">⌫</button>
            </div>
        </div>
        <div id="logo">RGOPages</div>
    </div>
<script src="script.js"></script>
</body>
</html>
